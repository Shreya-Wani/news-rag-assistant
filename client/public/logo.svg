<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Brain outline with glow -->
  <g filter="url(#glow)">
    <!-- Left hemisphere -->
    <path d="M30 8C22 8 16 12 14 18C10 20 8 25 8 30C8 34 10 38 13 40C12 43 13 47 16 50C18 52 22 54 26 54C28 55 30 56 32 56" 
          stroke="url(#brainGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Right hemisphere -->
    <path d="M34 8C42 8 48 12 50 18C54 20 56 25 56 30C56 34 54 38 51 40C52 43 51 47 48 50C46 52 42 54 38 54C36 55 34 56 32 56" 
          stroke="url(#brainGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Center line -->
    <path d="M32 8L32 56" stroke="url(#brainGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <!-- Left brain folds -->
    <path d="M14 28C20 28 24 24 28 22" stroke="url(#brainGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M12 36C18 36 24 32 30 32" stroke="url(#brainGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M18 46C22 44 26 42 30 42" stroke="url(#brainGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Right brain folds -->
    <path d="M50 28C44 28 40 24 36 22" stroke="url(#brainGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M52 36C46 36 40 32 34 32" stroke="url(#brainGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M46 46C42 44 38 42 34 42" stroke="url(#brainGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Neural dots -->
    <circle cx="20" cy="20" r="2" fill="url(#brainGrad)" opacity="0.8"/>
    <circle cx="44" cy="20" r="2" fill="url(#brainGrad)" opacity="0.8"/>
    <circle cx="16" cy="34" r="1.5" fill="url(#brainGrad)" opacity="0.6"/>
    <circle cx="48" cy="34" r="1.5" fill="url(#brainGrad)" opacity="0.6"/>
    <circle cx="22" cy="48" r="1.5" fill="url(#brainGrad)" opacity="0.7"/>
    <circle cx="42" cy="48" r="1.5" fill="url(#brainGrad)" opacity="0.7"/>
    <circle cx="32" cy="16" r="2" fill="url(#brainGrad)" opacity="0.9"/>
  </g>
</svg>
